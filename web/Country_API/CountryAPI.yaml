openapi: 3.0.3
info:
  title: Country API
  description: A simple API to retrieve and manage country information.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: http://localhost:8080/v1
    description: Local development server
paths:
  /countries:
    get:
      summary: List all countries
      description: Returns a list of all countries, optionally filtered by region.
      operationId: listCountries
      parameters:
        - name: region
          in: query
          description: Filter countries by region
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of countries to return
          required: false
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          description: Number of countries to skip
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: A JSON array of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country'
        'default':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Add a new country
      description: Adds a new country to the database.
      operationId: addCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Country'
      responses:
        '201':
          description: Country created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        'default':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /countries/{code}:
    parameters:
      - name: code
        in: path
        description: The 2-letter ISO 3166-1 alpha-2 code of the country
        required: true
        schema:
          type: string
          pattern: '^[A-Z]{2}$'
    get:
      summary: Get a country by code
      description: Returns details of a specific country by its ISO code.
      operationId: getCountryByCode
      responses:
        '200':
          description: A country object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        'default':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update a country
      description: Updates an existing country's information.
      operationId: updateCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Country'
      responses:
        '200':
          description: Country updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        'default':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a country
      description: Deletes a country from the database.
      operationId: deleteCountry
      responses:
        '204':
          description: Country deleted successfully
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        'default':
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Country:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          description: The 2-letter ISO 3166-1 alpha-2 code of the country.
          example: US
        name:
          type: string
          description: The common name of the country.
          example: United States
        capital:
          type: string
          description: The capital city of the country.
          example: Washington, D.C.
        region:
          type: string
          description: The region the country is located in.
          example: Americas
        population:
          type: integer
          description: The population of the country.
          example: 331002651
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: The HTTP status code or a custom error code.
          example: 404
        message:
          type: string
          description: A human-readable error message.
          example: Not found
